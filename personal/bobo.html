<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bobo's Space</title>

    <link rel="icon" href="favicon.png" type="image/png">
    
    <style>
        /* 基础样式重置 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe9f0 0%, #ffffff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
        }

        /* 核心卡片容器 */
        .container {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px); /* 效果 */
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.3);
            max-width: 800px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* 上部区域：动画和名字 */
        .header-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        .name-title {
            font-size: 4rem;
            font-weight: 200;
            color: #ff9fb2;
            letter-spacing: 5px;
            margin: 0;
            text-transform: lowercase;
        }

        /* 装饰性横隔线 */
        .divider {
            height: 2px;
            background: linear-gradient(to right, transparent, #ffb6c1, transparent);
            margin: 20px 0 40px 0;
            position: relative;
        }

        .divider::after {
            content: '✿';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 0 10px;
            color: #ffb6c1;
        }

        /* 按钮区域 */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            background-color: white;
            color: #ff9fb2;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.2);
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4);
            background-color: #ff9fb2;
            color: white;
        }

        /* --- 蜜袋鼯动画样式 --- */
        .glider {
            transform-origin: center bottom;
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .eye-pupil {
            animation: blink 4s infinite;
            transform-origin: center;
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.1); }
        }

        .ear-left {
            transform-origin: 60px 60px;
            animation: twitch-l 2s infinite;
        }
        .ear-right {
            transform-origin: 140px 60px;
            animation: twitch-r 2s infinite;
        }

        @keyframes twitch-l {
            0%, 80%, 100% { transform: rotate(0deg); }
            90% { transform: rotate(-10deg); }
        }
        @keyframes twitch-r {
            0%, 70%, 100% { transform: rotate(0deg); }
            85% { transform: rotate(10deg); }
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .header-section {
                flex-direction: column;
                text-align: center;
            }
            .name-title {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <div class="animation-box">
                <svg width="180" height="180" viewBox="0 0 200 200">
                    <g class="glider">
                        <circle class="ear-left" cx="60" cy="60" r="25" fill="#A9A9A9" />
                        <circle class="ear-right" cx="140" cy="60" r="25" fill="#A9A9A9" />
                        <circle cx="100" cy="110" r="70" fill="#D3D3D3" />
                        <path d="M100 40 Q100 60 100 80" stroke="#4F4F4F" stroke-width="8" stroke-linecap="round" fill="none" />
                        <g class="eye-pupil">
                            <circle cx="65" cy="110" r="18" fill="#1A1A1A" />
                            <circle cx="135" cy="110" r="18" fill="#1A1A1A" />
                            <circle cx="70" cy="105" r="5" fill="white" />
                            <circle cx="140" cy="105" r="5" fill="white" />
                        </g>
                        <circle cx="100" cy="130" r="6" fill="#FFB6C1" />
                        <path d="M90 145 Q100 155 110 145" stroke="#4F4F4F" stroke-width="2" fill="none" />
                    </g>
                </svg>
            </div>
            
            <h1 class="name-title">Bobo</h1>
        </div>

        <div class="divider"></div>

        <div class="button-group">
            <a href="#" class="btn">About</a>
            <a href="#" class="btn">:D</a>
            <a href="#" class="btn">Hobby</a>
        </div>
    </div>

</body>
</html>
