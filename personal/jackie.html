<style>
body {
        background-color: #DFF2FF;
        font-family: Georgia, 'Times New Roman', Times, serif;
        margin: 20px;
    }

/* Header */
    header {
        text-align: center;
        text-decoration: underline;
        background-color: aliceblue;
        margin: 10px;
        margin-top: 10px;
    }

    .colored-break {
        height: 2px;
        background-color: red; /* Choose your color */
        margin: 10px 0;
        display: block;
    }

/* Navigation */
    nav {
        background-color: rgba(162, 167, 241, 0.151);
        box-shadow: 0 4px 12px rgba(179, 172, 172, 0.2);
        margin-bottom: 40px;
        position: static;
        top: 0;
        z-index: 100;
    }

    nav ul {
        display: flex;
        justify-content: center;
        list-style-type: none;
        padding: 0;
    }

    nav li {
        margin: 0;
    }

    nav a {
        display: block;
        padding: 18px 30px;
        text-decoration: none;
        color: #333;
        font-weight: 600;
        transition: all 0.3s ease;
        border-bottom: 3px solid transparent;
    }

    nav a:hover {
        background-color: #f0f5ff;
        color: #02000a;
        border-bottom: 3px solid #6b5eb4;
    }


/* Image */
    .cartoon {
        display: flex;
    }

    div h3{
        text-align: center;
        background-color: aliceblue;
    }


    .snoopy {

    }

    }
